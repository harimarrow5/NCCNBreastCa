<!DOCTYPE html>
<html lang="en">
<head>
  <title>NCCN Breast Cancer Guidelines Simplified | Surgery MCQ & Intern Notes</title>

  <meta name="description" content="Simplified NCCN breast cancer guidelines for interns and residents. Learn NACT decisions, TNBC management, HER2 pathways, and exam-focused MCQs.">

  <meta name="keywords" content="NCCN breast cancer, breast cancer guidelines, TNBC NCCN, HER2 treatment, NACT breast cancer, surgery MCQ">

  <meta property="og:title" content="NCCN Breast Cancer Simplified">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCCN Breast Cancer — Decision Making Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --card: #161f35;
    --border: #1e2d4a;
    --accent: #e84393;
    --accent2: #00d4ff;
    --gold: #f5c842;
    --text: #e8edf5;
    --muted: #8899b4;
    --correct: #00e5a0;
    --wrong: #ff4d6d;
    --option-hover: #1a2a47;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG GRID */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 500px; height: 500px; background: var(--accent); top: -100px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: 100px; left: -100px; }

  /* HEADER */
  header {
    position: relative; z-index: 10;
    padding: 2.5rem 2rem 1.5rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(10,15,30,0.9) 0%, transparent 100%);
  }
  .badge {
    display: inline-block;
    font-size: 0.7rem; letter-spacing: 0.18em; font-weight: 600;
    color: var(--accent2);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 0.3rem 1rem; border-radius: 100px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  header p {
    margin-top: 0.6rem;
    color: var(--muted); font-size: 0.9rem;
  }

  /* PROGRESS */
  #progress-wrap {
    position: relative; z-index: 10;
    max-width: 800px; margin: 1.5rem auto 0;
    padding: 0 2rem;
  }
  .progress-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem;
  }
  .progress-bar-bg {
    height: 4px; background: var(--border); border-radius: 100px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .score-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.25);
    color: var(--gold); font-size: 0.82rem; font-weight: 600;
    padding: 0.3rem 0.8rem; border-radius: 100px;
  }

  /* MAIN */
  main {
    position: relative; z-index: 10;
    max-width: 800px; margin: 2rem auto;
    padding: 0 1.5rem 4rem;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem 2rem 1.5rem;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.4rem;
  }
  .q-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 900; color: var(--accent);
    line-height: 1; min-width: 2.5rem;
  }
  .q-tag {
    font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent2); border: 1px solid rgba(0,212,255,0.25);
    padding: 0.25rem 0.7rem; border-radius: 100px;
  }
  .q-text {
    font-size: 1.08rem; line-height: 1.65; font-weight: 500;
    color: var(--text); margin-bottom: 1.8rem;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 0.75rem; }
  .option {
    display: flex; align-items: flex-start; gap: 1rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }
  .option:hover:not(.disabled) {
    background: var(--option-hover);
    border-color: rgba(0,212,255,0.4);
    transform: translateX(4px);
  }
  .option.disabled { cursor: default; pointer-events: none; }
  .opt-letter {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700; color: var(--muted);
    transition: all 0.2s;
  }
  .opt-text { font-size: 0.95rem; line-height: 1.5; padding-top: 3px; }

  /* States */
  .option.correct { border-color: var(--correct); background: rgba(0,229,160,0.08); }
  .option.correct .opt-letter { background: var(--correct); color: #000; }
  .option.wrong   { border-color: var(--wrong);   background: rgba(255,77,109,0.08); }
  .option.wrong   .opt-letter { background: var(--wrong);   color: #fff; }

  /* EXPLANATION */
  .explanation {
    margin-top: 1.4rem;
    border-top: 1px solid var(--border);
    padding-top: 1.2rem;
    animation: fadeUp 0.35s ease both;
    display: none;
  }
  .explanation.show { display: block; }
  .exp-header {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 0.8rem;
  }
  .exp-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
  }
  .exp-icon.c { background: rgba(0,229,160,0.15); color: var(--correct); }
  .exp-icon.w { background: rgba(255,77,109,0.15); color: var(--wrong); }
  .exp-label { font-weight: 700; font-size: 0.9rem; }
  .exp-label.c { color: var(--correct); }
  .exp-label.w { color: var(--wrong); }
  .exp-text {
    font-size: 0.9rem; line-height: 1.7; color: #b8c8df;
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--accent2);
    border-radius: 0 8px 8px 0;
    padding: 0.9rem 1rem;
  }
  .exp-text strong { color: var(--accent2); }
  .nccn-ref {
    margin-top: 0.6rem;
    font-size: 0.78rem; color: var(--muted);
    font-style: italic;
  }

  /* NAV */
  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 1.5rem; gap: 1rem;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.7rem 1.6rem; border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 600;
    border: none; cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-next {
    background: linear-gradient(135deg, var(--accent), #c0355e);
    color: #fff;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,67,147,0.35); }
  .btn-next:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-prev {
    background: var(--surface); color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-prev:hover { color: var(--text); border-color: var(--muted); }

  /* RESULTS */
  #results {
    display: none;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 3rem 2rem;
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }
  #results.show { display: block; }
  .result-trophy { font-size: 4rem; margin-bottom: 1rem; }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }
  .result-score {
    font-size: 4rem; font-weight: 900;
    background: linear-gradient(135deg, var(--correct), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.1; margin: 1rem 0;
  }
  .result-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }
  .stat-row {
    display: flex; justify-content: center; gap: 2rem;
    margin: 1.5rem 0;
    flex-wrap: wrap;
  }
  .stat-item { text-align: center; }
  .stat-val { font-size: 1.6rem; font-weight: 800; }
  .stat-val.g { color: var(--correct); }
  .stat-val.r { color: var(--wrong); }
  .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
  .btn-restart {
    background: linear-gradient(135deg, var(--accent2), #0088aa);
    color: #fff; margin-top: 1rem;
    padding: 0.8rem 2.5rem; font-size: 1rem;
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,212,255,0.3); }

  /* CATEGORY FILTERS */
  .cat-bar {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    margin-bottom: 1.5rem;
    position: relative; z-index: 10;
    max-width: 800px; margin: 1rem auto 0;
    padding: 0 1.5rem;
  }
  .cat-chip {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em;
    padding: 0.3rem 0.85rem; border-radius: 100px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: default;
  }
  .cat-chip.active { border-color: var(--accent2); color: var(--accent2); background: rgba(0,212,255,0.07); }

  @media (max-width: 600px) {
    header { padding: 1.5rem 1rem; }
    .q-card { padding: 1.4rem; }
    .q-num { font-size: 1.5rem; }
    main { padding: 0 1rem 3rem; }
    .stat-row { gap: 1.2rem; }
  }
</style>
</head>
<body>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<header>
  <div class="badge">NCCN Guidelines v2024 · Evidence-Based</div>
  <h1>Breast Cancer<br>Decision-Making Quiz</h1>
  <p>50 high-yield clinical questions across all breast cancer subtypes</p>
</header>

<div id="progress-wrap">
  <div class="progress-meta">
    <span id="q-counter">Question 1 of 50</span>
    <span class="score-badge" id="score-display">⭐ Score: 0 / 0</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:2%"></div>
  </div>
</div>

<div class="cat-bar" id="cat-bar"></div>

<main>
  <div class="q-card" id="q-card">
    <div class="q-meta">
      <div class="q-num" id="q-num">01</div>
      <div class="q-tag" id="q-tag">Staging</div>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options-wrap"></div>
    <div class="explanation" id="explanation">
      <div class="exp-header">
        <div class="exp-icon" id="exp-icon"></div>
        <span class="exp-label" id="exp-label"></span>
      </div>
      <div class="exp-text" id="exp-text"></div>
      <div class="nccn-ref" id="nccn-ref"></div>
    </div>
    <div class="nav-row">
      <button class="btn btn-prev" id="btn-prev" onclick="navigate(-1)">← Prev</button>
      <button class="btn btn-next" id="btn-next" onclick="navigate(1)" disabled>Next →</button>
    </div>
  </div>

  <div id="results">
    <div class="result-trophy">🏆</div>
    <div class="result-title">Quiz Complete!</div>
    <div class="result-score" id="r-score"></div>
    <div class="result-sub" id="r-sub"></div>
    <div class="stat-row">
      <div class="stat-item"><div class="stat-val g" id="r-correct"></div><div class="stat-label">Correct</div></div>
      <div class="stat-item"><div class="stat-val r" id="r-wrong"></div><div class="stat-label">Incorrect</div></div>
      <div class="stat-item"><div class="stat-val" style="color:var(--muted)" id="r-skip"></div><div class="stat-label">Skipped</div></div>
    </div>
    <button class="btn btn-restart" onclick="restartQuiz()">🔄 Restart Quiz</button>
  </div>
</main>

<script>
const questions = [
  // ── STAGING & PATHOLOGY ──────────────────────────────────────────────
  {
    cat: "Staging",
    q: "A 45-year-old woman has a 2.2 cm invasive ductal carcinoma with 2 of 15 sentinel lymph nodes positive (macrometastases, no extranodal extension). Per AJCC 8th edition/NCCN, what is her pathological stage?",
    opts: ["pT2 pN1a — Stage IIA", "pT2 pN1a — Stage IIB", "pT2 pN2a — Stage IIIA", "pT1c pN1a — Stage IIA"],
    ans: 1,
    exp: "<strong>pT2 pN1a = Stage IIB.</strong> T2 = tumor >2 cm and ≤5 cm. pN1a = 1–3 axillary LN macrometastases. Per AJCC 8th/NCCN, T2N1M0 = Stage IIB. Note: Anatomic stage can be further modified by biomarker (Prognostic Stage Group) but anatomic stage IIB applies here.",
    ref: "NCCN BC v4.2024 – ST-1; AJCC 8th Edition Table 48.4"
  },
  {
    cat: "Staging",
    q: "Which of the following upgrades a clinical Stage IIA (T2N0) breast cancer to Prognostic Stage Group IA per NCCN?",
    opts: ["ER+/PR+, HER2−, Ki67 <20%, Oncotype DX RS <11", "ER−/PR−, HER2+, Grade 3", "ER+/PR−, HER2−, Grade 2, Oncotype DX RS 26", "ER+/PR+, HER2+, Grade 1"],
    ans: 0,
    exp: "<strong>Low Oncotype DX RS (<11) in ER+/HER2− tumors downstages the prognostic group.</strong> NCCN adopts AJCC 8th edition Prognostic Stage Groups, which integrate ER, PR, HER2, and grade (± Oncotype RS for T1-2 N0). RS <11 with ER+/PR+/HER2− can reduce T2N0 from Anatomic IIA to Prognostic IA.",
    ref: "NCCN BC v4.2024 – BINV-A; AJCC 8th Ed Table 48.8"
  },
  // ── DCIS ────────────────────────────────────────────────────────────
  {
    cat: "DCIS",
    q: "A 55-year-old postmenopausal woman has ER-positive DCIS (grade 2, 1.5 cm), treated with breast-conserving surgery achieving clear margins. Per NCCN, what is the preferred adjuvant radiation recommendation?",
    opts: ["No radiation needed regardless of grade", "Whole-breast irradiation (WBI) or accelerated partial breast irradiation (APBI) if eligible", "Mastectomy with immediate reconstruction", "Chemotherapy + radiation"],
    ans: 1,
    exp: "<strong>Post-lumpectomy WBI (or APBI if eligible) is recommended for DCIS after BCS.</strong> NCCN recommends RT after BCS for most DCIS patients to reduce local recurrence. APBI may be considered for low-risk DCIS (≥50 years, low-intermediate grade, ≤2.5 cm, margins ≥3 mm). Endocrine therapy (tamoxifen or AI) can be offered additionally for ER+ DCIS.",
    ref: "NCCN BC v4.2024 – DCIS-3, DCIS-4"
  },
  {
    cat: "DCIS",
    q: "Which feature qualifies a DCIS patient as 'low-risk' for local recurrence under NCCN/ASTRO APBI criteria?",
    opts: ["Age <45, ER−, high grade, margins 2 mm", "Age ≥50, ER+, low-intermediate grade, ≤2.5 cm, margins ≥3 mm", "Age ≥50, ER−, high grade, 3 cm", "Any DCIS if ER+"],
    ans: 1,
    exp: "<strong>ASTRO/NCCN APBI suitable criteria for DCIS:</strong> Age ≥50, screen-detected, unicentric, ≤2.5 cm, low-intermediate grade, ER+, clear margins ≥3 mm, no lymphovascular invasion. All criteria must be met for suitable classification.",
    ref: "NCCN BC v4.2024 – DCIS-4; ASTRO APBI consensus 2017"
  },
  // ── EARLY STAGE / BCS ───────────────────────────────────────────────
  {
    cat: "Early Stage",
    q: "Per NCCN, what is the minimum surgical margin required to be considered 'adequate' for invasive breast carcinoma after BCS?",
    opts: ["1 mm", "No ink on tumor (no tumor at ink)", "2 mm", "5 mm"],
    ans: 1,
    exp: "<strong>'No ink on tumor' is the accepted adequate margin for invasive cancer.</strong> SSO-ASTRO-ASCO consensus (adopted by NCCN) defines a negative margin for invasive BC as no ink on tumor. Wider margins do not significantly reduce local recurrence risk with whole-breast RT. For DCIS, ≥2 mm is preferred.",
    ref: "NCCN BC v4.2024 – BINV-4; SSO-ASTRO margin guideline 2014"
  },
  {
    cat: "Early Stage",
    q: "A 62-year-old woman has a 1.8 cm ER+/PR+/HER2− invasive ductal carcinoma (Luminal A, Grade 1) with clinically node-negative axilla. Sentinel lymph node biopsy reveals 1 SLN with a 0.3 mm micrometastasis. Per NCCN/Z0011 principles, what is the appropriate axillary management?",
    opts: ["Complete axillary lymph node dissection (ALND)", "No further axillary surgery if proceeding with BCS + WBI", "Axillary radiation mandatory", "Mastectomy required"],
    ans: 1,
    exp: "<strong>Z0011 trial: No ALND needed for 1–2 positive SLNs in eligible patients.</strong> NCCN recommends omitting ALND for patients with T1-T2 tumors, 1–2 positive SLNs, undergoing BCS with planned WBI, and no gross extranodal extension. Micrometastases further support observation. ALND is not recommended in this scenario.",
    ref: "NCCN BC v4.2024 – BINV-F; ACOSOG Z0011 trial"
  },
  {
    cat: "Early Stage",
    q: "An Oncotype DX Recurrence Score of 26 is returned for a postmenopausal patient with a 2 cm ER+/HER2− node-negative invasive breast cancer. Per NCCN (RxPONDER/TAILORx data), what is the recommendation?",
    opts: ["Endocrine therapy alone", "Chemotherapy + endocrine therapy", "Neoadjuvant chemotherapy then surgery", "Clinical trial only"],
    ans: 1,
    exp: "<strong>RS 26 (intermediate-high risk, 26–100): TAILORx showed chemotherapy benefit in premenopausal and high RS patients.</strong> For postmenopausal women with RS 26-100 and node-negative disease, NCCN recommends chemotherapy + endocrine therapy. RS ≤25 in postmenopausal, node-negative = endocrine therapy alone (per TAILORx).",
    ref: "NCCN BC v4.2024 – BINV-I; TAILORx NEJM 2018"
  },
  {
    cat: "Early Stage",
    q: "Which Oncotype DX RS threshold can be used to safely omit chemotherapy in node-POSITIVE (1–3 LN+) postmenopausal patients with ER+/HER2− breast cancer per NCCN?",
    opts: ["RS ≤11", "RS ≤25", "RS ≤17", "No threshold — all node-positive patients need chemo"],
    ans: 1,
    exp: "<strong>RxPONDER: RS ≤25 in postmenopausal node-positive patients = no chemotherapy benefit.</strong> In the RxPONDER trial, postmenopausal women with 1–3 positive LNs and RS ≤25 had equivalent outcomes with endocrine therapy alone. Premenopausal women with RS ≤25 still benefit from chemotherapy (or ovarian suppression).",
    ref: "NCCN BC v4.2024 – BINV-I; RxPONDER NEJM 2021"
  },
  // ── HER2+ ───────────────────────────────────────────────────────────
  {
    cat: "HER2+",
    q: "A patient with stage IIA (T2N0) HER2-positive, ER-negative breast cancer is to receive neoadjuvant therapy. Per NCCN, which is the preferred regimen?",
    opts: ["AC × 4 cycles alone", "Paclitaxel + trastuzumab + pertuzumab (THP) followed by AC (TCHP or AC→THP)", "Trastuzumab monotherapy", "CMF regimen"],
    ans: 1,
    exp: "<strong>NCCN preferred neoadjuvant regimen for HER2+ BC includes dual HER2 blockade (trastuzumab + pertuzumab) with chemotherapy.</strong> Options include TCHP (docetaxel/carboplatin/trastuzumab/pertuzumab) or AC→THP. Dual blockade (NeoSphere, TRYPHAENA trials) achieves higher pCR rates. The choice depends on cardiac risk and institutional preference.",
    ref: "NCCN BC v4.2024 – BINV-K; NeoSphere, TRYPHAENA trials"
  },
  {
    cat: "HER2+",
    q: "A HER2-positive breast cancer patient underwent neoadjuvant chemotherapy + trastuzumab/pertuzumab. Surgery reveals residual invasive disease (non-pCR). Per NCCN/KATHERINE, what adjuvant therapy is recommended?",
    opts: ["Continue trastuzumab + pertuzumab for 1 year", "Switch to ado-trastuzumab emtansine (T-DM1) × 14 cycles", "Add capecitabine", "No further HER2-targeted therapy"],
    ans: 1,
    exp: "<strong>T-DM1 (ado-trastuzumab emtansine) is NCCN preferred for residual disease after neoadjuvant HER2-directed therapy (KATHERINE trial).</strong> KATHERINE showed T-DM1 significantly improved iDFS vs. trastuzumab alone (50% reduction in invasive disease or death). 14 cycles (3-weekly) are recommended.",
    ref: "NCCN BC v4.2024 – BINV-L; KATHERINE trial NEJM 2019"
  },
  {
    cat: "HER2+",
    q: "For a patient with pT1b (0.6 cm) HER2+/ER− node-negative breast cancer, per NCCN what is the recommended adjuvant chemotherapy + targeted therapy regimen?",
    opts: ["Trastuzumab + pertuzumab × 1 year only", "Paclitaxel weekly × 12 + trastuzumab (APT regimen)", "TCHP × 6 cycles", "Observation — too small for treatment"],
    ans: 1,
    exp: "<strong>APT regimen (paclitaxel weekly × 12 + trastuzumab) is NCCN preferred for T1a-bN0 HER2+ BC.</strong> The TOLANEY APT study showed 7-year iDFS of 93% with this well-tolerated regimen. For ≤1 cm node-negative HER2+ tumors, APT is preferred over more intensive regimens to balance efficacy and toxicity.",
    ref: "NCCN BC v4.2024 – BINV-K; APT trial Tolaney et al."
  },
  // ── TRIPLE NEGATIVE ─────────────────────────────────────────────────
  {
    cat: "TNBC",
    q: "A 40-year-old woman with Stage II triple-negative breast cancer (TNBC) undergoes neoadjuvant chemotherapy (AC→paclitaxel). Surgery shows residual disease. Per NCCN (CREATE-X), what adjuvant therapy should be offered?",

// ── STATE ────────────────────────────────────────────────────────────────
let current = 0;
let answers = new Array(questions.length).fill(null); // null | 'correct' | 'wrong'
let selectedOpts = new Array(questions.length).fill(null);

// ── INIT ─────────────────────────────────────────────────────────────────
function init() {
  renderCatBar();
  render(0);
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  const cats = [...new Set(questions.map(q => q.cat))];
  bar.innerHTML = cats.map(c =>
    `<span class="cat-chip" data-cat="${c}">${c}</span>`
  ).join('');
}

function updateCatBar(idx) {
  const cat = questions[idx].cat;
  document.querySelectorAll('.cat-chip').forEach(ch => {
    ch.classList.toggle('active', ch.dataset.cat === cat);
  });
}

function render(idx) {
  const q = questions[idx];
  document.getElementById('q-num').textContent = String(idx + 1).padStart(2, '0');
  document.getElementById('q-tag').textContent = q.cat;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-counter').textContent = `Question ${idx + 1} of ${questions.length}`;

  // Progress
  document.getElementById('progress-fill').style.width = `${((idx + 1) / questions.length) * 100}%`;

  // Score
  const answered = answers.filter(a => a !== null).length;
  const correct = answers.filter(a => a === 'correct').length;
  document.getElementById('score-display').textContent = `⭐ Score: ${correct} / ${answered}`;

  // Options
  const wrap = document.getElementById('options-wrap');
  const letters = ['A', 'B', 'C', 'D'];
  wrap.innerHTML = q.opts.map((opt, i) => {
    let cls = 'option';
    if (selectedOpts[idx] !== null) {
      cls += ' disabled';
      if (i === q.ans) cls += ' correct';
      else if (i === selectedOpts[idx] && selectedOpts[idx] !== q.ans) cls += ' wrong';
    }
    return `<div class="${cls}" onclick="selectOption(${i})">
      <div class="opt-letter">${letters[i]}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join('');

  // Explanation
  const expEl = document.getElementById('explanation');
  if (selectedOpts[idx] !== null) {
    const correct_ = selectedOpts[idx] === q.ans;
    document.getElementById('exp-icon').className = `exp-icon ${correct_ ? 'c' : 'w'}`;
    document.getElementById('exp-icon').textContent = correct_ ? '✓' : '✗';
    document.getElementById('exp-label').className = `exp-label ${correct_ ? 'c' : 'w'}`;
    document.getElementById('exp-label').textContent = correct_ ? 'Correct!' : 'Incorrect';
    document.getElementById('exp-text').innerHTML = q.exp;
    document.getElementById('nccn-ref').textContent = `📚 Reference: ${q.ref}`;
    expEl.classList.add('show');
  } else {
    expEl.classList.remove('show');
  }

  // Nav
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = selectedOpts[idx] === null && idx < questions.length - 1;
  document.getElementById('btn-next').textContent = idx === questions.length - 1 ? 'Finish 🏁' : 'Next →';

  updateCatBar(idx);

  // Animate card
  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.35s ease both';
}

function selectOption(optIdx) {
  if (selectedOpts[current] !== null) return;
  selectedOpts[current] = optIdx;
  answers[current] = optIdx === questions[current].ans ? 'correct' : 'wrong';
  document.getElementById('btn-next').disabled = false;
  render(current);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0) return;
  if (next >= questions.length) {
    showResults();
    return;
  }
  current = next;
  render(current);
}

function showResults() {
  document.getElementById('q-card').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('cat-bar').style.display = 'none';
  const correct = answers.filter(a => a === 'correct').length;
  const wrong = answers.filter(a => a === 'wrong').length;
  const skipped = answers.filter(a => a === null).length;
  const pct = Math.round((correct / questions.length) * 100);
  document.getElementById('r-score').textContent = `${pct}%`;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skipped;
  let msg = pct >= 80 ? '🎉 Excellent! NCCN-ready!' : pct >= 60 ? '👍 Good effort — review the missed areas.' : '📖 Review NCCN guidelines and retry.';
  document.getElementById('r-sub').textContent = msg;
  document.getElementById('results').classList.add('show');
}

function restartQuiz() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  selectedOpts = new Array(questions.length).fill(null);
  document.getElementById('q-card').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('cat-bar').style.display = 'flex';
  document.getElementById('results').classList.remove('show');
  render(0);
}

init();
</script>
